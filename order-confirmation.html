<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Order confirmation for Adokicks purchases.">
  <title>Adokicks | Order Confirmation</title>
  <link rel="icon" type="image/png" href="adokicks.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js" defer></script>
</head>
<body data-page="confirmation">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header id="app-header" role="banner" aria-label="Site header"></header>
  <main id="main-content" role="main" aria-label="Order confirmation page">
    <section class="confirmation" aria-label="Order placed confirmation">
      <div class="checkmark" aria-hidden="true">✓</div>
      <h1>Order Placed Successfully</h1>
      <p id="confirmation-order-id"></p>
      <p>You will be redirected to My Orders in <span id="redirect-seconds">10</span> seconds.</p>
      <a href="my-orders.html" class="btn-secondary" aria-label="Go to my orders now">Go Now</a>
    </section>
  </main>
  <footer id="app-footer" role="contentinfo" aria-label="Site footer"></footer>
</body>
</html>
