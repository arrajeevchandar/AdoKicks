<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search results for Adokicks products.">
  <title>Adokicks | Search</title>
  <link rel="icon" type="image/png" href="adokicks.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/app.js" defer></script>
</head>
<body data-page="search">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header id="app-header" role="banner" aria-label="Site header"></header>
  <main id="main-content" role="main" aria-label="Search results">
    <section aria-label="Search result section">
      <h1>Search Results</h1>
      <p id="search-summary" aria-live="polite"></p>
      <div id="search-grid" class="product-grid" role="list" aria-label="Search results list"></div>
    </section>
  </main>
  <footer id="app-footer" role="contentinfo" aria-label="Site footer"></footer>
</body>
</html>
